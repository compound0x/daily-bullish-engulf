name: Market Scanner
on:
  workflow_dispatch: # This adds a "Run Workflow" button in GitHub
  schedule:
    - cron: '0 9 * * 1-5' # Runs at 9 AM every weekday
permissions: 
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: {python-version: '3.12'}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scanner
        run: python market_scanner.py # This generates your HTML file

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: . # Assuming your script saves the HTML here

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add trade_history.json history.html
          git commit -m "Update trade history"
          git push
